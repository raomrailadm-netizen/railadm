<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OLIVE — RailADM Wireframe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;}
.hidden{display:none!important;}
.screen{width:100%;min-height:100vh;}
/* OLIVE */
.ol-nav{background:#1e3a5f;display:flex;align-items:center;padding:0 20px;height:48px;gap:16px;}
.ol-logo{color:#7dd3fc;font-weight:700;font-size:15px;}
.ol-link{color:#94a3b8;font-size:12px;padding:4px 10px;cursor:pointer;}
.ol-link:hover{color:#fff;}
.ol-body{display:flex;min-height:calc(100vh - 48px);}
.ol-sb{width:180px;background:#fff;border-right:1px solid #e2e8f0;padding:12px 0;}
.ol-si{padding:8px 16px;font-size:12px;color:#475569;cursor:pointer;}
.ol-si:hover{background:#f1f5f9;}
.ol-si.on{background:#eff6ff;color:#1d4ed8;font-weight:600;}
.ol-main{flex:1;padding:24px;background:#f8fafc;}
.ol-h1{font-size:20px;font-weight:600;color:#1e293b;margin-bottom:4px;}
.ol-h2{font-size:13px;color:#64748b;margin-bottom:24px;}
.ol-sec{font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;}
.ol-tiles{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
.ol-tile{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px 14px;width:128px;cursor:pointer;text-align:center;transition:all .15s;}
.ol-tile:hover{border-color:#3b82f6;box-shadow:0 0 0 2px #dbeafe;}
.ol-tile-ic{font-size:22px;margin-bottom:6px;}
.ol-tile-lb{font-size:11px;color:#475569;font-weight:500;}
.ol-tile.star{border:2px solid #f59e0b;background:#fffbeb;}
.ol-notice{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;width:270px;flex-shrink:0;}
.srow{display:flex;gap:8px;margin-bottom:10px;}
.sbox{flex:1;text-align:center;padding:8px;background:#f8fafc;border-radius:6px;}
.snum{font-size:18px;font-weight:700;}
.slbl{font-size:10px;color:#64748b;}
/* DARK */
.dk{background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;}
.dk-ops{background:#0a0a1a;}
.rnav{background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 16px;height:48px;flex-shrink:0;}
.rlogo{font-size:15px;font-weight:700;margin-right:20px;}
.bc-wrap{display:flex;align-items:center;gap:4px;font-size:12px;flex:1;flex-wrap:wrap;}
.bc-lnk{color:#7dd3fc;cursor:pointer;}
.bc-lnk:hover{color:#bae6fd;}
.bc-sep{color:#475569;}
.bc-cur{color:#94a3b8;}
.tog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.tog-lbl{font-size:11px;color:#94a3b8;}
.tog-lbl.on{color:#e2e8f0;font-weight:600;}
.tog{width:44px;height:22px;border-radius:11px;position:relative;cursor:pointer;background:#1d4ed8;flex-shrink:0;}
.tog.ops{background:#7c3aed;}
.tog-dot{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;}
.tog-dot.r{left:25px;}
.rsb{width:190px;background:#1e293b;border-right:1px solid #334155;padding:12px 0;flex-shrink:0;}
.rsb-ops{background:#111827;}
.rsb-sec{padding:8px 16px;font-size:10px;font-weight:600;color:#64748b;letter-spacing:.8px;text-transform:uppercase;margin-top:8px;}
.rsb-i{padding:8px 16px;font-size:12px;color:#94a3b8;cursor:pointer;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rsb-i:hover{background:#334155;color:#e2e8f0;}
.rsb-i.on{background:rgba(30,64,175,.2);color:#7dd3fc;border-left-color:#3b82f6;}
.rsb-i.on-ops{background:rgba(124,58,237,.2);color:#a78bfa;border-left-color:#7c3aed;}
.rmain{flex:1;padding:20px;overflow-y:auto;}
.ptitle{font-size:18px;font-weight:600;color:#f1f5f9;margin-bottom:4px;}
.psub{font-size:12px;color:#64748b;margin-bottom:20px;}
/* Metric */
.mc{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:14px 16px;}
.mc-dk{background:#1a1f2e;border-color:#2d3748;}
.mv{font-size:24px;font-weight:700;}
.ml{font-size:11px;color:#64748b;margin-top:4px;}
.red{color:#f87171;}.amb{color:#fbbf24;}.grn{color:#4ade80;}.blu{color:#7dd3fc;}
.bdg{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-top:6px;font-weight:500;}
.bd-r{background:#450a0a;color:#f87171;}.bd-a{background:#451a03;color:#fbbf24;}.bd-g{background:#052e16;color:#4ade80;}.bd-b{background:#0c1a3a;color:#7dd3fc;}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
/* Traffic light */
.tl-wrap{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px;margin-bottom:20px;}
.tl-title{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:12px;}
.tl-tbl{width:100%;border-collapse:collapse;}
.tl-tbl th{font-size:10px;color:#64748b;padding:6px 8px;text-align:center;border-bottom:1px solid #334155;}
.tl-tbl th.lh{text-align:left;}
.tl-tbl td{padding:7px 6px;text-align:center;border-bottom:1px solid #1e293b;}
.tl-tbl .ll{font-size:12px;color:#94a3b8;font-weight:500;text-align:left;padding:7px 8px;}
.tl{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;position:relative;}
.tl:hover{opacity:.8;}
.tl-r{background:#450a0a;color:#f87171;}.tl-a{background:#451a03;color:#fbbf24;}.tl-g{background:#052e16;color:#4ade80;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-r{background:#ef4444;}.dot-a{background:#f59e0b;}.dot-g{background:#22c55e;}
.tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid #475569;border-radius:6px;padding:8px 10px;font-size:11px;color:#e2e8f0;white-space:pre-line;z-index:999;min-width:200px;line-height:1.6;pointer-events:none;}
.tl:hover .tip{display:block;}
/* Action cards */
.ac{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:14px;}
.ac.crit{border-left:3px solid #ef4444;}.ac.hi{border-left:3px solid #f59e0b;}.ac.med{border-left:3px solid #3b82f6;}
.ac-urg{font-size:9px;font-weight:700;letter-spacing:.8px;margin-bottom:6px;}
.ac-asset{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:4px;}
.ac-desc{font-size:11px;color:#94a3b8;margin-bottom:10px;line-height:1.5;}
.ac-btns{display:flex;gap:6px;flex-wrap:wrap;}
/* Buttons */
.btn{border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn:hover{opacity:.85;}
.btn-p{background:#1d4ed8;color:#fff;}.btn-s{background:#334155;color:#cbd5e1;}.btn-d{background:#7f1d1d;color:#fca5a5;}.btn-w{background:#78350f;color:#fde68a;}.btn-g{background:#14532d;color:#86efac;}
/* Charts */
.ch{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px;}
.ch-dk{background:#1a1f2e;border-color:#2d3748;}
.ch-t{font-size:11px;font-weight:600;color:#64748b;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.bar-grp{display:flex;align-items:flex-end;gap:5px;height:110px;padding-bottom:8px;border-bottom:1px solid #334155;}
.bi{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;position:relative;}
.bar{border-radius:3px 3px 0 0;width:100%;min-height:4px;cursor:pointer;position:relative;}
.bar:hover{opacity:.8;}
.b-lbl{font-size:9px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px;text-align:center;}
.b-val{font-size:9px;color:#94a3b8;}
.btip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid #475569;border-radius:6px;padding:8px 10px;font-size:11px;color:#e2e8f0;white-space:pre-line;z-index:999;min-width:160px;line-height:1.6;}
.bar:hover .btip{display:block;}
/* Table */
.dt{width:100%;border-collapse:collapse;font-size:11px;}
.dt th{background:#0f172a;color:#64748b;padding:7px 10px;text-align:left;font-weight:500;border-bottom:1px solid #334155;}
.dt td{padding:7px 10px;border-bottom:1px solid #1e3a5f;color:#cbd5e1;}
.dt tr:hover td{background:#1e3a5f;cursor:pointer;}
.sb-wrap{background:#0f172a;border-radius:4px;height:8px;width:70px;overflow:hidden;display:inline-block;}
.sb-fill{height:8px;border-radius:4px;}
/* Risk bars */
.rs-big{font-size:48px;font-weight:700;text-align:center;line-height:1;}
.rs-lbl{font-size:11px;color:#64748b;text-align:center;margin-top:4px;margin-bottom:12px;}
.rf{margin-bottom:10px;}
.rf-lbl{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:4px;}
.rf-track{background:#0f172a;border-radius:4px;height:10px;}
.rf-fill{height:10px;border-radius:4px;}
/* Modal */
.mo{flex:1;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;}
.mb{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;width:100%;max-width:580px;}
.mt-h{font-size:16px;font-weight:600;color:#f1f5f9;margin-bottom:4px;}
.mt-s{font-size:12px;color:#64748b;margin-bottom:16px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;color:#94a3b8;font-weight:500;}
input,select,textarea{background:#0f172a;border:1px solid #334155;border-radius:6px;padding:7px 10px;font-size:12px;color:#e2e8f0;outline:none;width:100%;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;}
textarea{resize:vertical;min-height:60px;}
.rp{display:inline-flex;align-items:center;gap:6px;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;margin-bottom:16px;}
.rp-r{background:#450a0a;color:#f87171;}.rp-a{background:#451a03;color:#fbbf24;}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid #334155;padding-top:16px;}
/* Config */
.cc{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px;}
.ct{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:14px;}
.sr{margin-bottom:14px;}
.sl{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:5px;}
.sv{color:#7dd3fc;font-weight:500;}
input[type=range]{accent-color:#3b82f6;cursor:pointer;}
/* Home */
.hs{margin-bottom:24px;}
.hs-t{font-size:10px;font-weight:600;color:#64748b;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.hs-t::after{content:"";flex:1;height:1px;background:#334155;}
.hc{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;}
.hc:hover{border-color:#3b82f6;background:#1e3a5f;}
.hc.al{border-left:3px solid #ef4444;}.hc.wn{border-left:3px solid #f59e0b;}.hc.ok{border-left:3px solid #22c55e;}
.hc-t{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:4px;}
.hc-d{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:10px;}
.hc-s{font-size:20px;font-weight:700;margin-bottom:4px;}
.hc-l{font-size:11px;color:#7dd3fc;}
.oc{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;cursor:pointer;text-align:center;transition:all .15s;}
.oc:hover{border-color:#7c3aed;background:#2e1065;}
.oc-t{font-size:10px;color:#94a3b8;font-weight:500;margin-top:6px;}
/* Progress bar */
.prog-wrap{background:#0f172a;border-radius:4px;height:10px;margin-top:4px;}
.prog-fill{height:10px;border-radius:4px;}
/* Risk card */
.risk-box{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:20px 16px;text-align:center;}
/* Section divider */
.sec-div{font-size:10px;font-weight:600;color:#64748b;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-div::after{content:"";flex:1;height:1px;background:#334155;}
</style>
</head>
<body>
<div id="app">
  <div id="s-olive"      class="screen"></div>
  <div id="s-home"       class="screen hidden"></div>
  <div id="s-mgmt-risk"  class="screen hidden"></div>
  <div id="s-mgmt-renew" class="screen hidden"></div>
  <div id="s-mgmt-ops"   class="screen hidden"></div>
  <div id="s-drill-risk" class="screen hidden"></div>
  <div id="s-drill-renew"class="screen hidden"></div>
  <div id="s-drill-ops"  class="screen hidden"></div>
  <div id="s-modal-renew"class="screen hidden"></div>
  <div id="s-modal-fund" class="screen hidden"></div>
  <div id="s-modal-obs"  class="screen hidden"></div>
  <div id="s-modal-audit"class="screen hidden"></div>
  <div id="s-wl-home"    class="screen hidden"></div>
  <div id="s-wl-inv"     class="screen hidden"></div>
  <div id="s-wl-perf"    class="screen hidden"></div>
  <div id="s-wl-spares"  class="screen hidden"></div>
  <div id="s-wl-am"      class="screen hidden"></div>
  <div id="s-wl-lcm"     class="screen hidden"></div>
  <div id="s-drill-inv"  class="screen hidden"></div>
  <div id="s-drill-perf" class="screen hidden"></div>
  <div id="s-drill-spares"class="screen hidden"></div>
  <div id="s-drill-am"   class="screen hidden"></div>
  <div id="s-drill-lcm"  class="screen hidden"></div>
  <div id="s-cfg"        class="screen hidden"></div>
</div>
<script>
// ── GLOBAL STATE ─────────────────────────────────────────────────
var isMgmt = true;
var CTX = { line:'CCL', system:'Rolling Stock', status:'r', score:92,
  pto:'SMRT', fy:'FY2026', budget:412, spent:46, tranche:280,
  pmPct:68, owCount:312, rework:18, manpower:82,
  condScore:32, remainLife:12, sparesSupport:35 };

var LINES = ['NSL','EWL','NEL','CCL','DTL','TEL','BPLRT','SPLRT'];
var SYSTEMS = ['Rolling Stock','Signalling','Power','Civil','Comms'];
var PTOS = {NSL:'SMRT',EWL:'SMRT',NEL:'SBST',CCL:'SMRT',DTL:'SBST',TEL:'SMRT',BPLRT:'SMRT',SPLRT:'SBST'};

// Risk grid data [line][system] = status
var RISK_GRID = [
  ['a','g','a','g','g'],['g','a','g','g','g'],['g','g','g','a','g'],
  ['r','a','g','g','a'],['g','g','a','g','g'],['g','g','g','g','g'],
  ['r','r','a','g','g'],['a','g','g','a','g']
];
var RENEW_GRID = [
  ['d','p','m','m','p'],['p','m','m','p','m'],['m','p','p','d','m'],
  ['d','d','p','m','p'],['m','p','m','m','p'],['m','m','p','p','m'],
  ['d','d','d','m','p'],['p','m','m','d','m']
];
var OPS_GRID = [
  ['g','a','g','g','a'],['g','g','g','a','g'],['g','g','a','g','g'],
  ['r','r','a','a','r'],['g','a','g','g','g'],['g','g','g','g','g'],
  ['r','r','r','a','r'],['a','g','g','a','g']
];

// Dynamic data generators based on context
function scoreForStatus(st) {
  if (st === 'r' || st === 'd') return 75 + Math.floor(Math.random()*20) + 5;
  if (st === 'a' || st === 'p') return 50 + Math.floor(Math.random()*20);
  return 15 + Math.floor(Math.random()*25);
}
function condForStatus(st) {
  if (st === 'r' || st === 'd') return 20 + Math.floor(Math.random()*20);
  if (st === 'a' || st === 'p') return 45 + Math.floor(Math.random()*20);
  return 70 + Math.floor(Math.random()*25);
}
function pmForStatus(st) {
  if (st === 'r') return 60 + Math.floor(Math.random()*15);
  if (st === 'a') return 80 + Math.floor(Math.random()*10);
  return 93 + Math.floor(Math.random()*5);
}

// ── NAVIGATION ────────────────────────────────────────────────────
function go(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById('s-' + id).classList.remove('hidden');
  window.scrollTo(0,0);
}

function setCtx(line, system, status) {
  CTX.line = line; CTX.system = system; CTX.status = status;
  CTX.score = scoreForStatus(status);
  CTX.pto = PTOS[line] || 'SMRT';
  CTX.condScore = condForStatus(status);
  CTX.pmPct = pmForStatus(status);
  CTX.rework = status === 'r' ? 15+Math.floor(Math.random()*8) : status === 'a' ? 6+Math.floor(Math.random()*5) : 2+Math.floor(Math.random()*3);
  CTX.owCount = status === 'r' ? 200+Math.floor(Math.random()*150) : status === 'a' ? 60+Math.floor(Math.random()*60) : 10+Math.floor(Math.random()*30);
  CTX.manpower = status === 'r' ? 70+Math.floor(Math.random()*12) : status === 'a' ? 82+Math.floor(Math.random()*8) : 92+Math.floor(Math.random()*6);
  CTX.remainLife = status === 'r' ? 5+Math.floor(Math.random()*15) : status === 'a' ? 25+Math.floor(Math.random()*20) : 55+Math.floor(Math.random()*30);
  CTX.sparesSupport = status === 'r' ? 20+Math.floor(Math.random()*20) : status === 'a' ? 45+Math.floor(Math.random()*20) : 75+Math.floor(Math.random()*20);
}

function clickRisk(li, ci) {
  var st = RISK_GRID[li][ci];
  setCtx(LINES[li], SYSTEMS[ci], st);
  buildDrillRisk(); go('drill-risk');
}
function clickRenew(li, ci) {
  var st = RENEW_GRID[li][ci];
  setCtx(LINES[li], SYSTEMS[ci], st);
  buildDrillRenew(); go('drill-renew');
}
function clickOps(li, ci) {
  var st = OPS_GRID[li][ci];
  setCtx(LINES[li], SYSTEMS[ci], st);
  buildDrillOps(); go('drill-ops');
}

function toggleMode(fromScreen) {
  isMgmt = !isMgmt;
  if (!isMgmt) {
    // Map management screen to relevant working level
    var map = {
      'mgmt-risk':'wl-spares','mgmt-renew':'wl-am','mgmt-ops':'wl-perf',
      'drill-risk':'wl-spares','drill-renew':'wl-am','drill-ops':'wl-perf'
    };
    var dest = map[fromScreen] || 'wl-home';
    buildWL(dest); go(dest);
  } else {
    // Map working level back to management
    var map2 = {
      'wl-spares':'mgmt-risk','wl-am':'mgmt-renew','wl-perf':'mgmt-ops',
      'drill-spares':'mgmt-risk','drill-am':'mgmt-renew','drill-perf':'mgmt-ops'
    };
    var dest2 = map2[fromScreen] || 'mgmt-risk';
    buildMgmt(dest2); go(dest2);
  }
}

// ── SHARED BUILDERS ───────────────────────────────────────────────
function makeNav(crumbs, sid) {
  var isOps = !isMgmt;
  var bc = '<span class="bc-lnk" onclick="go(\'olive\')">OLIVE</span><span class="bc-sep"> › </span>';
  for (var i=0; i<crumbs.length; i++) {
    if (i < crumbs.length-1) bc += '<span class="bc-lnk" onclick="buildAndGo(\''+crumbs[i].s+'\')">'+crumbs[i].l+'</span><span class="bc-sep"> › </span>';
    else bc += '<span class="bc-cur">'+crumbs[i].l+'</span>';
  }
  return '<div class="rnav">'
    +'<span class="rlogo"><span style="color:#f1f5f9;">RAIL</span><span style="color:#f59e0b;">ADM</span></span>'
    +'<div class="bc-wrap">'+bc+'</div>'
    +'<div class="tog-wrap">'
    +'<span class="tog-lbl '+(isOps?'':'on')+'">Management</span>'
    +'<div class="tog '+(isOps?'ops':'')+'" onclick="toggleMode(\''+sid+'\')"><div class="tog-dot '+(isOps?'r':'')+'"></div></div>'
    +'<span class="tog-lbl '+(isOps?'on':'')+'">Operations</span>'
    +'</div></div>';
}

function buildAndGo(sid) {
  buildMgmt(sid); buildWL(sid);
  go(sid);
}

function makeSB(act, isOpsMode) {
  var mgmtItems = [
    {id:'mgmt-risk', l:'Asset risk monitor'},
    {id:'mgmt-renew', l:'Renewal intelligence'},
    {id:'mgmt-ops', l:'Operator performance'}
  ];
  var wlItems = [
    {id:'wl-inv', l:'Asset inventory'},
    {id:'wl-perf', l:'Performance analysis'},
    {id:'wl-spares', l:'Spares & resources'},
    {id:'wl-am', l:'Asset mgmt & renewal'},
    {id:'wl-lcm', l:'Life cycle mgmt'}
  ];
  var cls = isOpsMode ? 'rsb rsb-ops' : 'rsb';

function makeTLGrid(gridData, clickFn, colHeaders, statusMap) {
  var gt = '<table class="tl-tbl"><thead><tr><th class="lh">Rail Line</th>';
  colHeaders.forEach(function(c){ gt += '<th>'+c+'</th>'; });
  gt += '</tr></thead><tbody>';
  LINES.forEach(function(line, li) {
    gt += '<tr><td class="ll">'+line+'</td>';
    gridData[li].forEach(function(c, ci) {
      var sm = statusMap[c];
      gt += '<td><div class="tl tl-'+sm.tc+'" onclick="'+clickFn+'('+li+','+ci+')">'
        +'<div class="dot dot-'+sm.tc+'"></div>'+sm.lbl
        +'<div class="tip">'+line+' — '+colHeaders[ci]+'\n'+PTOS[line]+'\n'+sm.tip+'</div>'
        +'</div></td>';
    });
    gt += '</tr>';
  });
  return gt + '</tbody></table>';
}

function makeBars(data, height) {
  height = height || 110;
  return data.map(function(d) {
    var h = Math.max(4, Math.round(d[1]/d[3]*height));
    return '<div class="bi"><span class="b-val">'+d[4]+'</span>'
      +'<div class="bar" style="height:'+h+'px;background:'+d[2]+';"><div class="btip">'+d[0]+'\n'+d[5]+'</div></div>'
      +'<span class="b-lbl">'+d[0]+'</span></div>';
  }).join('');
}

function colForVal(v, goodHigh) {
  if (goodHigh) return v >= 90 ? '#4ade80' : v >= 75 ? '#fbbf24' : '#f87171';
  return v <= 20 ? '#4ade80' : v <= 40 ? '#fbbf24' : '#f87171';
}

function pBar(pct, col) {
  return '<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%;background:'+col+';"></div></div>';
}

function statusColor(s) {
  return s==='r'||s==='d' ? '#f87171' : s==='a'||s==='p' ? '#fbbf24' : '#4ade80';
}
function statusBdg(s) {
  return s==='r'||s==='d' ? 'bd-r' : s==='a'||s==='p' ? 'bd-a' : 'bd-g';
}
function statusLabel(s) {
  var m={r:'CRITICAL',a:'HIGH',g:'NORMAL',d:'OVERDUE',p:'DUE SOON',m:'ON TRACK'};
  return m[s]||s;
}

  +'<div style="display:flex;gap:8px;margin-top:16px;">'
  +'<button class="btn btn-p">Save configuration</button>'
  +'<button class="btn btn-s">Reset to defaults</button>'
  +'<button class="btn btn-s" onclick="buildMgmtRisk();go(\'mgmt-risk\')">Back to risk monitor</button>'
  +'</div></div></div></div>';
}
